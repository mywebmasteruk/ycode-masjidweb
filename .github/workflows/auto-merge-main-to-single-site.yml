name: Sync main into single-site (PR)

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if single-site is behind main
        id: check
        run: |
          git fetch origin single-site
          BEHIND=$(git rev-list --count origin/single-site..origin/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base single-site --head main --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open — nothing to do."
          else
            gh pr create \
              --base single-site \
              --head main \
              --title "Sync upstream changes from main into single-site" \
              --body "$(cat <<'EOF'
          Automated PR created because **main** has new commits that are not yet in **single-site**.

          The CI build check must pass before this can be merged. Review the changes, then merge when ready.
          EOF
          )"
            echo "PR created."
          fi
